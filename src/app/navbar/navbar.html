<header class="border-b border-green-600 bg-green-600 text-white shadow-sm">
  <nav class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
    <a routerLink="/" class="flex items-center  text-2xl font-semibold tracking-[0.3em] text-white">
      <span class="text-white">CASE</span>
      <span class="text-gray-700">LO</span>
    </a>

    <div class="hidden md:block">
      <p-menubar [model]="items" styleClass="border-none bg-transparent p-0 shadow-none">
        <ng-template pTemplate="end">
          <div class="ml-4 flex items-center gap-2">
            <p-button routerLink="/login" label="Login" severity="secondary" [text]="true"></p-button>
            <p-button routerLink="/signup" label="Sign Up" icon="pi pi-user"></p-button>
          </div>
        </ng-template>
      </p-menubar>
    </div>

    <div class="flex items-center gap-2 md:hidden">
      <p-button routerLink="/login" icon="pi pi-bars" severity="secondary" [text]="true"></p-button>
    </div>
  </nav>
</header>
