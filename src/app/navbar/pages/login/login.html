<section class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(249,115,22,0.18),_transparent_35%),linear-gradient(135deg,_#f8fafc_0%,_#eef2ff_100%)]` can be written as `bg-[radial-gradient(circle_at_top_left,rgba(249,115,22,0.18),transparent_35%),linear-gradient(135deg,#f8fafc_0%,#eef2ff_100%)] px-4 py-10 sm:px-6 lg:px-8">
  <div class="mx-auto flex max-w-6xl items-center justify-center">
    <p-card styleClass="w-full overflow-hidden border border-slate-200 shadow-2xl">
      <div class="grid gap-10 md:grid-cols-[1.05fr_0.95fr]">
      
        <div class="p-2 sm:p-6 md:p-8">
          <div class="mb-6">
            <p class="text-sm font-semibold uppercase tracking-[0.35em] text-orange-500">Welcome back</p>
            <h2 class="mt-2 text-3xl font-semibold text-slate-900">Sign in to your account</h2>
            <p class="mt-2 text-sm text-slate-600">Continue your journey and stay on top of the latest opportunities.</p>
          </div>

          @if (errorMessage) {
            <p-message severity="error" [text]="errorMessage" styleClass="mb-4"></p-message>
          }

          @if (successMessage) {
            <p-message severity="success" [text]="successMessage" styleClass="mb-4"></p-message>
          }

          <form class="mt-6 space-y-4" (ngSubmit)="onSubmit()">
            <div class="space-y-2">
              <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
              <input id="username" name="username" pInputText [(ngModel)]="username" required placeholder="Enter your username" class="w-full" />
            </div>

            <div class="space-y-2">
              <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
              <input id="email" name="email" pInputText type="email" [(ngModel)]="email" required placeholder="you@example.com" class="w-full" />
            </div>

            <div class="space-y-2">
              <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
              <p-password id="password" name="password" [(ngModel)]="password" [toggleMask]="true" [feedback]="false" inputStyleClass="w-full" styleClass="w-full" placeholder="Enter your password"></p-password>
              <p class="text-xs text-slate-500">Use exactly 4 letters, 4 numbers, and 2 symbols.</p>
            </div>

            <p-button type="submit" label="Sign in" styleClass="w-full"></p-button>
          </form>

          <p-divider></p-divider>

          <p class="text-center text-sm text-slate-600">
            New here?
            <a routerLink="/signup" class="ml-1 font-semibold text-orange-500 hover:underline">Create an account</a>
          </p>
        </div>
      </div>
    </p-card>
  </div>
</section>
